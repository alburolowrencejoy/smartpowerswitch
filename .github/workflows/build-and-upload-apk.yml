name: Build And Upload APK

on:
  workflow_run:
    workflows:
      - Auto Version Bump
    types:
      - completed

permissions:
  contents: write

jobs:
  release-apk:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Resolve app version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          TAG="v${VERSION%%+*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Prepare release artifact
        shell: bash
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk "release/smartpowerswitch-${{ steps.version.outputs.version }}.apk"

      - name: Publish GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SmartPowerSwitch ${{ steps.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/smartpowerswitch-${{ steps.version.outputs.version }}.apk