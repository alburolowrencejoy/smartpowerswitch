name: Auto Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip version bump]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Bump pubspec version (patch + build)
        id: bump
        run: |
          NEXT_VERSION=$(dart run tool/bump_version.dart --write --part=patch)
          echo "next_version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          if git diff --quiet -- pubspec.yaml; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump app version to ${{ steps.bump.outputs.next_version }} [skip ci] [skip version bump]"
          git push